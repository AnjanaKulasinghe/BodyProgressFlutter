name: body_progress
description: Track your body transformation journey with progress photos, measurements, and analytics.

publish_to: 'none'

version: 4.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # Auth Providers
  sign_in_with_apple: ^6.1.1
  google_sign_in: ^6.2.1

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Image handling
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  image: ^4.2.0

  # Health Data (temporarily disabled due to Android compatibility)
  # health: ^10.2.0

  # Local Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Storage / File System
  path_provider: ^2.1.3
  shared_preferences: ^2.3.1

  # Charts
  fl_chart: ^0.68.0

  # Data utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  csv: ^6.0.0

  # Share / Export
  share_plus: ^9.0.0

  # UI Utilities
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/samples/
    - assets/icons/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 500
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/app_icon_1024.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/app_icon_1024.png"
